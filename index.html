<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hermes Project</title>
    <style>
        /* The Diagonal Gradient Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Maintained your vibrant HSLA gradient */
            background: linear-gradient(to bottom right, hsla(325, 100%, 35%, 0.8), hsl(282, 91%, 36%), hsla(234, 95%, 32%, 0.8));
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Centered Container */
        .container {
            background: hsla(0, 0%, 100%, 0.15); /* Switched to hsla for uniformity */
            border: 1px solid hsla(0, 0%, 100%, 0.2); 
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px hsla(0, 0%, 0%, 0.4); /* Deeper shadow for a floating realistic effect */
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        h1 { 
            margin-top: 0; 
            text-shadow: 0 2px 4px hsla(0, 0%, 0%, 0.3);
        }

        /* Prompt Box - Upgraded to a sleek, glowing pill */
        input[type="text"] {
            width: 85%; /* Adjusted slightly for the new padding */
            padding: 15px 25px; /* Extra side padding for the rounded edges */
            background: hsla(0, 0%, 0%, 0.2);
            color: hsla(0, 0%, 100%, 0.95);
            border: 1px solid hsla(0, 0%, 100%, 0.2);
            border-radius: 9999px; /* The CSS trick for a perfect rounded pill */
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px hsla(0, 0%, 0%, 0.3);
        }

        input[type="text"]::placeholder {
            color: hsla(0, 0%, 100%, 0.5);
        }

        input[type="text"]:focus {
            background: hsla(0, 0%, 0%, 0.3);
            border-color: hsla(190, 100%, 60%, 0.8); /* Cyan glowing edge on focus */
            box-shadow: 0 0 15px hsla(190, 100%, 60%, 0.3), inset 0 2px 5px hsla(0, 0%, 0%, 0.5);
        }

        /* Generate Button */
        button {
            background-color: hsla(210, 100%, 40%, 1); 
            color: white;
            border: 1px solid hsla(210, 100%, 60%, 0.5);
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 9999px; /* Pill shape to match input */
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px hsla(0, 0%, 0%, 0.2);
        }

        button:hover { 
            background-color: hsla(210, 100%, 50%, 1); 
            box-shadow: 0 6px 15px hsla(210, 100%, 60%, 0.4);
            transform: translateY(-1px);
        }

        /* Response Box - Tactile and deep */
        textarea {
            width: 85%;
            height: 200px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px; /* Soft corners */
            background: hsla(0, 0%, 0%, 0.4); /* Darker backdrop for text contrast */
            color: hsla(0, 0%, 100%, 0.9);
            border: 1px solid hsla(0, 0%, 100%, 0.15);
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            outline: none;
            display: none; 
            box-shadow: inset 0 4px 10px hsla(0, 0%, 0%, 0.5);
        }

        .copy-btn {
            background-color: hsla(134, 61%, 41%, 1);
            border-color: hsla(134, 61%, 60%, 0.5);
            margin-top: 15px;
            display: none; 
        }
        
        .copy-btn:hover { 
            background-color: hsla(134, 61%, 48%, 1);
            box-shadow: 0 6px 15px hsla(134, 61%, 60%, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Hermes Project</h1>
        <p>AI-Powered Professional Communications.</p>
        
        <input type="text" id="topicInput" placeholder="e.g., The importance of constant practice...">
        <br>
        <button id="generateBtn" onclick="generatePost()">Generate Post</button>
        
        <textarea id="responseBox" readonly></textarea>
        <br>
        <button id="copyBtn" class="copy-btn" onclick="copyText()">Copy to Clipboard</button>
    </div>

    <script>
        // NEW QoL FEATURE: Listen for the 'Enter' key
        document.getElementById('topicInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevents standard form submission behavior
                generatePost();
            }
        });

        async function generatePost() {
            const topic = document.getElementById('topicInput').value;
            const generateBtn = document.getElementById('generateBtn');
            const responseBox = document.getElementById('responseBox');
            const copyBtn = document.getElementById('copyBtn');

            if (!topic) {
                alert("Please enter a topic first!");
                return;
            }

            generateBtn.innerText = "Generating...";
            generateBtn.disabled = true;

            try {
                const response = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic: topic })
                });

                const data = await response.json();
                
                responseBox.value = data.engaging_linkedin_post;
                responseBox.style.display = "block";
                copyBtn.style.display = "inline-block";

            } catch (error) {
                responseBox.value = "Error connecting to the server. Make sure Uvicorn is running!";
                responseBox.style.display = "block";
            }

            generateBtn.innerText = "Generate Post";
            generateBtn.disabled = false;
        }

        function copyText() {
            const responseBox = document.getElementById('responseBox');
            navigator.clipboard.writeText(responseBox.value);
            
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => { copyBtn.innerText = "Copy to Clipboard"; }, 2000);
        }
    </script>
</body>
</html>
